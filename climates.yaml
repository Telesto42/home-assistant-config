- platform: generic_thermostat
  name: Heating Zone 1
  heater: switch.heating_zone_1
  target_sensor: sensor.livingroom_multisensor_temperature_air
  min_temp: 18
  max_temp: 28
  ac_mode: false
  target_temp: 20
  cold_tolerance: 0.3
  hot_tolerance: 0.3
  min_cycle_duration:
    minutes: 3
  keep_alive:
    minutes: 3
  initial_hvac_mode: "heat"
  away_temp: 20
  precision: 0.1

