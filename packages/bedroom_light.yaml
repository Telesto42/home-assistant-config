input_boolean:
  bedroom_light_logic_state:
    name: Bedroom Light Logic State

template:
  - light:
      - name: "Bedroom IR Light"
        unique_id: bedroom_ir_light
        state: "{{ is_state('input_boolean.bedroom_light_logic_state', 'on') }}"
        turn_on:
          - condition: state
            entity_id: input_boolean.bedroom_light_logic_state
            state: "off"
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.bedroom_light_logic_state
          - service: remote.send_command
            target:
              entity_id: remote.remote_bedroom
            data:
              device: bedroom_lights
              command: on_off
        turn_off:
          - condition: state
            entity_id: input_boolean.bedroom_light_logic_state
            state: "on"
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.bedroom_light_logic_state
          - service: remote.send_command
            target:
              entity_id: remote.remote_bedroom
            data:
              device: bedroom_lights
              command: on_off
