- id: '1771601717136'
  alias: Publish large room temperature to largeroom_heater
  description: ''
  triggers:
  - entity_id: climate.large_room_better_thermostat
    attribute: current_temperature
    trigger: state
  - minutes: /5
    trigger: time_pattern
  actions:
  - data:
      topic: devices/largeroom_heater/temperature
      payload: '{{ state_attr(''climate.large_room_better_thermostat'',''current_temperature'')
        }}'
      qos: 1
      retain: true
    action: mqtt.publish
  mode: single
- id: '1771601745636'
  alias: Publish large room setpoint to largeroom_heater
  description: ''
  triggers:
  - entity_id: climate.large_room_better_thermostat
    attribute: temperature
    trigger: state
  actions:
  - data:
      topic: devices/largeroom_heater/setpoint
      payload: '{{ state_attr(''climate.large_room_better_thermostat'',''temperature'')
        }}'
      qos: 1
      retain: true
    action: mqtt.publish
  mode: single
- id: '1771860054425'
  alias: Sync largeroom_heater control with climate
  description: Publikuje ON/OFF na devices/largeroom_heater/control podle stavu climate.large_room_better_thermostat
  triggers:
  - entity_id: climate.large_room_better_thermostat
    trigger: state
  - entity_id: climate.large_room_better_thermostat
    attribute: hvac_action
    trigger: state
  - entity_id: climate.large_room_better_thermostat
    attribute: hvac_mode
    trigger: state
  - event_type: homeassistant_start
    trigger: event
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ state_attr(''climate.large_room_better_thermostat'',''hvac_action'')
          == ''heating'' }}

          '
      sequence:
      - data:
          topic: devices/largeroom_heater/control
          payload: 'ON'
          qos: 1
          retain: true
        action: mqtt.publish
    - conditions:
      - condition: template
        value_template: '{{ state_attr(''climate.large_room_better_thermostat'',''hvac_mode'')
          == ''heat'' }}

          '
      sequence:
      - data:
          topic: devices/largeroom_heater/control
          payload: 'ON'
          qos: 1
          retain: true
        action: mqtt.publish
    default:
    - data:
        topic: devices/largeroom_heater/control
        payload: 'OFF'
        qos: 1
        retain: true
      action: mqtt.publish
  mode: single
- id: '1772013170495'
  alias: Outside stairs and entrance lights
  triggers:
  - entity_id: binary_sensor.main_door_contact
    to: 'on'
    trigger: state
  - entity_id: binary_sensor.outside_stairs_motion_occupancy
    to: 'on'
    trigger: state
  conditions:
  - condition: sun
    after: sunset
    before: sunrise
  actions:
  - target:
      entity_id: light.entrances_lights
    action: light.turn_on
  - wait_for_trigger:
    - entity_id: binary_sensor.outside_stairs_motion_occupancy
      to: 'off'
      for: 00:03:00
      trigger: state
    timeout: 00:05:00
    continue_on_timeout: true
  - target:
      entity_id: light.entrances_lights
    action: light.turn_off
  mode: restart
