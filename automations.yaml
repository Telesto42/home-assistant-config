- id: '1772630347742'
  alias: Bedroom IR Light - Sync according to power
  description: ''
  triggers:
  - entity_id: sensor.bedroom_lights_power
    trigger: state
  conditions: []
  actions:
  - delay: 00:00:10
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ states(''sensor.bedroom_lights_power'') | float(0) > 10
          }}'
      sequence:
      - target:
          entity_id: input_boolean.bedroom_light_logic_state
        action: input_boolean.turn_on
    - conditions:
      - condition: template
        value_template: '{{ states(''sensor.bedroom_lights_power'') | float(0) <=
          10 }}'
      sequence:
      - target:
          entity_id: input_boolean.bedroom_light_logic_state
        action: input_boolean.turn_off
  mode: restart
- &id001
  id: hot_water_tank_turn_on_when_conditions_met
  alias: Zapni bojler při přebytku solárů a plné baterii a nízké teplotě
  description: Zapne input_boolean.hot_water_tank když jsou splněny všechny tři podmínky.
  triggers:
  - value_template: "{{ (states('sensor.solar_surplus_power') | float(0) > 2600)\n
      \  and (states('sensor.solax_inverter_battery_remaining_capacity')    | float(0)
      > 70)\n   and (states('sensor.tasmota_ds18b20_temperature') | float(0) < 55)
      }}"
    trigger: template
  conditions:
  - condition: state
    entity_id: input_boolean.hot_water_tank
    state: 'off'
  actions:
  - target:
      entity_id: input_boolean.hot_water_tank
    action: input_boolean.turn_on
  mode: single
- *id001
- *id001
