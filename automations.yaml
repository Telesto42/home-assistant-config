- id: '1778011299438'
  alias: Garden valve start
  description: ''
  triggers:
  - trigger: state
    entity_id: input_boolean.garden_valve_timer
    to: 'on'
  conditions: []
  actions:
  - action: switch.turn_on
    target:
      entity_id: switch.garden_valve
  - action: timer.start
    target:
      entity_id: timer.garden_valve_timer
    data:
      duration: '{{ states(''input_number.garden_valve_duration'') | int * 60 }}

        '
  mode: restart
- id: '1778011429254'
  alias: Garden valve stop
  description: ''
  triggers:
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.garden_valve_timer
  conditions: []
  actions:
  - action: switch.turn_off
    target:
      entity_id: switch.garden_valve
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.garden_valve_timer
  mode: single
- id: '1778011462848'
  alias: Garden valve manual stop
  description: ''
  triggers:
  - trigger: state
    entity_id: input_boolean.garden_valve_timer
    to: 'off'
  conditions: []
  actions:
  - action: timer.cancel
    target:
      entity_id: timer.garden_valve_timer
    data: {}
  - action: switch.turn_off
    target:
      entity_id: switch.garden_valve
  mode: restart
