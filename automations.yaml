- id: hot_water_tank_turn_off_on_high_temp
  alias: Vypni bojler při dosažení vysoké teploty
  description: Vypne input_boolean.hot_water_tank když je teplota v topném zásobníku
    > 61°C.
  triggers:
  - entity_id: sensor.tasmota_ds18b20_temperature
    above: 61
    trigger: numeric_state
  conditions:
  - condition: state
    entity_id: input_boolean.hot_water_tank
    state: 'on'
  actions:
  - target:
      entity_id: input_boolean.hot_water_tank
    action: input_boolean.turn_off
  mode: single
- id: '1773954638602'
